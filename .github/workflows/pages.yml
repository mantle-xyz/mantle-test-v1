name: Deploy Reports to GitHub Pages

on:
  push:
    branches: ["main"]
    paths: ["reports/**"]
  repository_dispatch:
    types: [module-ci-complete]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download module report
        uses: dawidd6/action-download-artifact@v6
        with:
          repo: ${{ github.event.client_payload.repo }}
          workflow: ${{ github.event.client_payload.workflow }}
          name: ${{ github.event.client_payload.artifact }}
          path: /tmp/report/
          github_token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Commit report
        run: |
          MODULE="${{ github.event.client_payload.module }}"
          PLAN="${{ github.event.client_payload.plan }}"
          mkdir -p reports/${MODULE}/
          for f in /tmp/report/*.html; do
            [ -f "$f" ] || continue
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            if [ -n "$PLAN" ]; then
              DEST="reports/${MODULE}/${PLAN}-${TIMESTAMP}.html"
            else
              DEST="reports/${MODULE}/${TIMESTAMP}.html"
            fi
            cp "$f" "$DEST"
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || { git commit -m "Add ${MODULE} report" && git push; }

  deploy:
    if: always()
    needs: [collect]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate index.html
        run: REPORTS_DIR=reports python3 orchestrator/scripts/generate-index.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
