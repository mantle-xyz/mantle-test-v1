name: Mantle Test Orchestrator

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to run (comma-separated, empty=all)'
        required: false
      environment:
        description: 'Environment (localchain, qa, mainnet)'
        required: false
        default: 'localchain'
      plan_name:
        description: 'Test plan name (auto-generated if empty)'
        required: false

env:
  GO_VERSION: '1.25'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: |
          cd orchestrator
          go build -o bin/mantle-test ./cmd/mantle-test/
          go vet ./...
      - uses: actions/upload-artifact@v4
        with:
          name: mantle-test
          path: orchestrator/bin/mantle-test

  plan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: mantle-test, path: orchestrator/bin/ }
      - run: chmod +x orchestrator/bin/mantle-test
      - name: Show plan
        run: |
          cd orchestrator
          ENV=${{ inputs.environment || 'localchain' }}
          MODULES="${{ inputs.modules }}"
          ARGS="--config=configs/${ENV}.yaml"
          if [ -n "$MODULES" ]; then
            ARGS="$ARGS --modules=$MODULES"
          fi
          ./bin/mantle-test plan $ARGS

  trigger-eest:
    if: contains(inputs.modules || 'eest', 'eest')
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mantle-execution-specs CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: mantle-xyz/mantle-execution-specs
          event-type: mantle-test
          client-payload: |
            {
              "rpc_url": "${{ secrets.L2_RPC_URL }}",
              "chain_id": "${{ secrets.L2_CHAIN_ID }}",
              "fork_name": "Cancun",
              "run_id": "${{ github.run_id }}",
              "plan": "${{ inputs.plan_name || (github.event_name == 'schedule' && format('daily-{0}', github.run_number)) || format('run-{0}', github.run_number) }}"
            }

  trigger-execution-apis:
    if: contains(inputs.modules || 'execution-apis', 'execution-apis')
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mantle-execution-apis CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: mantle-xyz/mantle-execution-apis
          event-type: mantle-test
          client-payload: |
            {
              "run_id": "${{ github.run_id }}",
              "plan": "${{ inputs.plan_name || (github.event_name == 'schedule' && format('daily-{0}', github.run_number)) || format('run-{0}', github.run_number) }}"
            }

  # Create a plan to link all module reports from this run
  # Only for manual dispatch and scheduled runs (not push triggers)
  create-plan:
    needs: [trigger-eest, trigger-execution-apis]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull --rebase || true

      - name: Create plan
        run: |
          # Determine plan name
          if [ -n "${{ inputs.plan_name }}" ]; then
            PLAN_NAME="${{ inputs.plan_name }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            PLAN_NAME="daily-$(date -u +%Y%m%d)"
          else
            PLAN_NAME="run-${{ github.run_number }}"
          fi

          mkdir -p reports/plans
          cat > reports/plans/${PLAN_NAME}.json << EOF
          {
            "name": "${PLAN_NAME}",
            "description": "Triggered by ${{ github.event_name }}, run #${{ github.run_number }}",
            "created": "$(date -u +%Y%m%d-%H%M%S)",
            "environment": "${{ inputs.environment || 'localchain' }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          echo "Created plan: ${PLAN_NAME}"

      - name: Commit plan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/plans/
          git diff --cached --quiet || {
            git commit -m "Add plan: $(ls -t reports/plans/*.json | head -1 | xargs basename .json)"
            git push || { git pull --rebase && git push; }
          }
