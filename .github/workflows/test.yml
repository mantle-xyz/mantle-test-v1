name: Mantle Test Orchestrator

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to run (comma-separated, empty=all)'
        required: false
      environment:
        description: 'Environment (localchain, qa, mainnet)'
        required: false
        default: 'localchain'
      plan_name:
        description: 'Test plan name (auto-generated if empty)'
        required: false

env:
  GO_VERSION: '1.25'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: |
          cd orchestrator
          go build -o bin/mantle-test ./cmd/mantle-test/
          go vet ./...
      - uses: actions/upload-artifact@v4
        with:
          name: mantle-test
          path: orchestrator/bin/mantle-test

  plan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: mantle-test, path: orchestrator/bin/ }
      - run: chmod +x orchestrator/bin/mantle-test
      - name: Show plan
        run: |
          cd orchestrator
          ENV=${{ inputs.environment || 'localchain' }}
          MODULES="${{ inputs.modules }}"
          ARGS="--config=configs/${ENV}.yaml"
          if [ -n "$MODULES" ]; then
            ARGS="$ARGS --modules=$MODULES"
          fi
          ./bin/mantle-test plan $ARGS

  trigger-eest:
    if: contains(inputs.modules || 'eest', 'eest')
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mantle-execution-specs CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: mantle-xyz/mantle-execution-specs
          event-type: mantle-test
          client-payload: |
            {
              "rpc_url": "${{ secrets.L2_RPC_URL }}",
              "chain_id": "${{ secrets.L2_CHAIN_ID }}",
              "fork_name": "Cancun",
              "run_id": "${{ github.run_id }}"
            }

  trigger-execution-apis:
    if: contains(inputs.modules || 'execution-apis', 'execution-apis')
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mantle-execution-apis CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: mantle-xyz/mantle-execution-apis
          event-type: mantle-test
          client-payload: |
            {
              "run_id": "${{ github.run_id }}"
            }

  # After all modules triggered, create a plan that links their reports
  create-plan:
    needs: [trigger-eest, trigger-execution-apis]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for module reports
        run: sleep 30  # Give module CIs time to push reports

      - name: Pull latest reports
        run: git pull --rebase

      - name: Create plan
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          PLAN_NAME="${{ inputs.plan_name }}"
          if [ -z "$PLAN_NAME" ]; then
            PLAN_NAME="Run #${{ github.run_number }} (${{ inputs.environment || 'localchain' }})"
          fi

          mkdir -p reports/plans

          # Find latest report from each module that was triggered
          REPORTS="[]"
          for module_dir in reports/*/; do
            module=$(basename "$module_dir")
            [ "$module" = "plans" ] && continue

            latest=$(ls -t "$module_dir"*.html 2>/dev/null | head -1)
            if [ -n "$latest" ]; then
              rel_path="${latest#reports/}"
              REPORTS=$(echo "$REPORTS" | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          r.append({'module':'$module','file':'$rel_path'})
          print(json.dumps(r))")
            fi
          done

          cat > reports/plans/${TIMESTAMP}.json << EOF
          {
            "name": "$PLAN_NAME",
            "timestamp": "$TIMESTAMP",
            "trigger": "GitHub Actions Run #${{ github.run_number }}",
            "environment": "${{ inputs.environment || 'localchain' }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reports": $REPORTS
          }
          EOF

          echo "Created plan: $PLAN_NAME"
          cat reports/plans/${TIMESTAMP}.json

      - name: Commit plan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add test plan: ${{ inputs.plan_name || format('Run #{0}', github.run_number) }}"
            for i in 1 2 3; do
              git push && break || { git pull --rebase; }
            done
          fi
