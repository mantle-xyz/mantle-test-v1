<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#fafafa" rx="12"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Automation Flow 自动化流程</text>

  <!-- Step 1: Code Change -->
  <rect x="30" y="50" width="180" height="50" rx="8" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="120" y="72" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">① Code Change</text>
  <text x="120" y="88" text-anchor="middle" fill="#bfdbfe" font-size="10">op-geth PR / mantle-v2 PR</text>

  <!-- Webhook -->
  <line x1="210" y1="75" x2="270" y2="75" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="68" text-anchor="middle" font-size="10" fill="#888">webhook</text>

  <!-- Step 2: Auto Trigger -->
  <rect x="272" y="42" width="300" height="70" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="422" y="62" text-anchor="middle" font-weight="700" fill="#333" font-size="13">② Auto Trigger Tests</text>
  <text x="332" y="82" font-size="10" fill="#1e40af">EEST CI</text>
  <text x="422" y="82" font-size="10" fill="#92400e">RPC CI</text>
  <text x="492" y="82" font-size="10" fill="#166534">op-e2e CI</text>
  <text x="332" y="98" font-size="10" fill="#7e22ce">acceptance CI</text>
  <text x="422" y="98" font-size="10" fill="#666">(各仓库独立跑)</text>

  <!-- Results flow back -->
  <line x1="572" y1="60" x2="640" y2="60" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="606" y="53" text-anchor="middle" font-size="10" fill="#888">status</text>

  <!-- Step 3: Block/Allow Merge -->
  <rect x="642" y="42" width="230" height="70" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="757" y="62" text-anchor="middle" font-weight="700" fill="#333" font-size="13">③ Auto Block/Allow</text>

  <!-- Pass path -->
  <rect x="660" y="76" width="90" height="24" rx="4" fill="#dcfce7"/>
  <text x="705" y="93" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">✅ All Pass</text>

  <!-- Fail path -->
  <rect x="760" y="76" width="90" height="24" rx="4" fill="#fee2e2"/>
  <text x="805" y="93" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">❌ Any Fail</text>

  <!-- Pass → Merge allowed -->
  <line x1="705" y1="100" x2="705" y2="140" stroke="#16a34a" stroke-width="1.5" marker-end="url(#green)"/>
  <rect x="640" y="142" width="130" height="30" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="705" y="162" text-anchor="middle" font-size="11" fill="#166534" font-weight="600">PR can merge ✓</text>

  <!-- Fail → Block -->
  <line x1="805" y1="100" x2="805" y2="140" stroke="#dc2626" stroke-width="1.5" marker-end="url(#red)"/>
  <rect x="740" y="142" width="130" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="805" y="162" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">Merge blocked ✗</text>

  <!-- Divider -->
  <line x1="30" y1="200" x2="870" y2="200" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Step 4: Report Aggregation -->
  <text x="450" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#333">④ Report Auto Aggregate + Push</text>

  <!-- CI Complete signals -->
  <rect x="50" y="245" width="160" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="130" y="270" text-anchor="middle" font-size="11" fill="#1e40af">EEST CI Complete</text>

  <rect x="230" y="245" width="160" height="40" rx="6" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="310" y="270" text-anchor="middle" font-size="11" fill="#92400e">RPC CI Complete</text>

  <rect x="410" y="245" width="160" height="40" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="490" y="270" text-anchor="middle" font-size="11" fill="#166534">op-e2e Complete</text>

  <rect x="590" y="245" width="170" height="40" rx="6" fill="#fdf4ff" stroke="#d8b4fe"/>
  <text x="675" y="270" text-anchor="middle" font-size="11" fill="#7e22ce">acceptance Complete</text>

  <!-- Arrows to aggregator -->
  <line x1="130" y1="285" x2="350" y2="320" stroke="#666" stroke-width="1" marker-end="url(#a)"/>
  <line x1="310" y1="285" x2="380" y2="320" stroke="#666" stroke-width="1" marker-end="url(#a)"/>
  <line x1="490" y1="285" x2="450" y2="320" stroke="#666" stroke-width="1" marker-end="url(#a)"/>
  <line x1="675" y1="285" x2="500" y2="320" stroke="#666" stroke-width="1" marker-end="url(#a)"/>

  <!-- Report Aggregator -->
  <rect x="280" y="322" width="300" height="45" rx="8" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="430" y="342" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">Report Aggregator</text>
  <text x="430" y="358" text-anchor="middle" fill="#bfdbfe" font-size="10">mantle-test-v1 CI</text>

  <!-- Output -->
  <line x1="350" y1="367" x2="200" y2="405" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="430" y1="367" x2="430" y2="405" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="510" y1="367" x2="660" y2="405" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="100" y="407" width="200" height="40" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="200" y="425" text-anchor="middle" font-size="11" fill="#333" font-weight="600">📊 Aggregated Report</text>
  <text x="200" y="440" text-anchor="middle" font-size="10" fill="#888">HTML + JSON + Markdown</text>

  <rect x="330" y="407" width="200" height="40" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="430" y="425" text-anchor="middle" font-size="11" fill="#333" font-weight="600">💬 Lark Notification</text>
  <text x="430" y="440" text-anchor="middle" font-size="10" fill="#888">Pass/Fail + Link to report</text>

  <rect x="560" y="407" width="200" height="40" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="660" y="425" text-anchor="middle" font-size="11" fill="#333" font-weight="600">📦 GitHub Artifact</text>
  <text x="660" y="440" text-anchor="middle" font-size="10" fill="#888">All module reports archived</text>

  <!-- Summary -->
  <rect x="100" y="465" width="660" height="40" rx="6" fill="#f8f9fa" stroke="#e5e7eb"/>
  <text x="430" y="480" text-anchor="middle" font-size="11" fill="#666">Code change → Auto test → Auto block if fail → Auto report to Lark</text>
  <text x="430" y="496" text-anchor="middle" font-size="11" fill="#999">Zero manual intervention after initial setup</text>
</svg>
