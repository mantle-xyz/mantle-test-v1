<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#fafafa" rx="12"/>
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">CI Pipeline</text>

  <!-- Orchestrator CI -->
  <rect x="200" y="42" width="400" height="40" rx="6" fill="#2563eb"/>
  <text x="400" y="67" text-anchor="middle" fill="#fff" font-weight="600">mantle-test-v1 CI (Orchestrator)</text>

  <line x1="300" y1="82" x2="300" y2="102" stroke="#666" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="500" y1="82" x2="500" y2="102" stroke="#666" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Build + Plan -->
  <rect x="200" y="104" width="180" height="32" rx="4" fill="#fff" stroke="#d1d5db"/>
  <text x="290" y="125" text-anchor="middle" fill="#333">Build + Plan</text>

  <rect x="420" y="104" width="180" height="32" rx="4" fill="#fff" stroke="#d1d5db"/>
  <text x="510" y="125" text-anchor="middle" fill="#333">Trigger Module CIs</text>

  <!-- Arrows to each module CI -->
  <line x1="460" y1="136" x2="120" y2="176" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="490" y1="136" x2="320" y2="176" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="530" y1="136" x2="520" y2="176" stroke="#86efac" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="560" y1="136" x2="700" y2="176" stroke="#c084fc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Module CIs -->
  <rect x="30" y="178" width="180" height="80" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="120" y="198" text-anchor="middle" font-weight="600" fill="#1e40af">EEST CI</text>
  <text x="120" y="214" text-anchor="middle" fill="#666" font-size="10">mantle-execution-specs</text>
  <text x="120" y="230" text-anchor="middle" fill="#666" font-size="10">mantle-test.yaml</text>
  <text x="120" y="248" text-anchor="middle" fill="#999" font-size="10">→ HTML report</text>

  <rect x="230" y="178" width="180" height="80" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="320" y="198" text-anchor="middle" font-weight="600" fill="#92400e">execution-apis CI</text>
  <text x="320" y="214" text-anchor="middle" fill="#666" font-size="10">mantle-execution-apis</text>
  <text x="320" y="230" text-anchor="middle" fill="#666" font-size="10">mantle-test.yaml</text>
  <text x="320" y="248" text-anchor="middle" fill="#999" font-size="10">→ speccheck log</text>

  <rect x="430" y="178" width="160" height="80" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="510" y="198" text-anchor="middle" font-weight="600" fill="#166534">op-e2e CI</text>
  <text x="510" y="214" text-anchor="middle" fill="#666" font-size="10">mantle-v2</text>
  <text x="510" y="230" text-anchor="middle" fill="#666" font-size="10">existing workflow</text>
  <text x="510" y="248" text-anchor="middle" fill="#999" font-size="10">→ go test log</text>

  <rect x="610" y="178" width="160" height="80" rx="6" fill="#fdf4ff" stroke="#c084fc"/>
  <text x="690" y="198" text-anchor="middle" font-weight="600" fill="#7e22ce">acceptance CI</text>
  <text x="690" y="214" text-anchor="middle" fill="#666" font-size="10">mantle-v2</text>
  <text x="690" y="230" text-anchor="middle" fill="#666" font-size="10">existing workflow</text>
  <text x="690" y="248" text-anchor="middle" fill="#999" font-size="10">→ test results</text>

  <!-- Arrows back to collect -->
  <line x1="120" y1="258" x2="300" y2="298" stroke="#666" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="320" y1="258" x2="360" y2="298" stroke="#666" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="510" y1="258" x2="440" y2="298" stroke="#666" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="690" y1="258" x2="500" y2="298" stroke="#666" stroke-width="1" marker-end="url(#ar)"/>

  <!-- Collect Reports -->
  <rect x="200" y="300" width="400" height="40" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="400" y="325" text-anchor="middle" font-weight="600" fill="#333">Collect Reports → reports/&lt;timestamp&gt;/</text>

  <!-- Triggers -->
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#888">Triggers: PR/push → build+plan+EEST+RPC | main push → all modules | manual dispatch → choose modules</text>

  <!-- Each module has own CI note -->
  <rect x="130" y="378" width="540" height="18" rx="3" fill="#f8f9fa"/>
  <text x="400" y="392" text-anchor="middle" font-size="10" fill="#aaa">Each module CI runs independently in its own repo. Orchestrator CI only triggers and collects.</text>
</svg>
