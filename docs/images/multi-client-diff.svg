<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="600" height="280" fill="#fafafa" rx="10"/>
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Multi-client Comparison 多客户端比对</text>

  <!-- EEST fixtures -->
  <rect x="200" y="40" width="200" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="300" y="63" text-anchor="middle" font-weight="600" fill="#1e40af">EEST 5000+ test fixtures</text>

  <line x1="240" y1="76" x2="150" y2="106" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="360" y1="76" x2="450" y2="106" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- op-geth -->
  <rect x="50" y="108" width="200" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="150" y="130" text-anchor="middle" font-weight="600" fill="#991b1b">execute remote</text>
  <text x="150" y="148" text-anchor="middle" fill="#666" font-size="11">--rpc-endpoint=op-geth-rpc</text>

  <!-- reth -->
  <rect x="350" y="108" width="200" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="450" y="130" text-anchor="middle" font-weight="600" fill="#991b1b">execute remote</text>
  <text x="450" y="148" text-anchor="middle" fill="#666" font-size="11">--rpc-endpoint=reth-rpc</text>

  <line x1="150" y1="158" x2="150" y2="188" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="450" y1="158" x2="450" y2="188" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Results -->
  <rect x="80" y="190" width="140" height="30" rx="4" fill="#dcfce7"/>
  <text x="150" y="210" text-anchor="middle" font-size="11" fill="#166534">Result A (HTML)</text>

  <rect x="380" y="190" width="140" height="30" rx="4" fill="#dcfce7"/>
  <text x="450" y="210" text-anchor="middle" font-size="11" fill="#166534">Result B (HTML)</text>

  <!-- Both PASS = consistent -->
  <line x1="220" y1="205" x2="380" y2="205" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="300" y="200" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">Both PASS = EVM consistent</text>

  <!-- Note -->
  <rect x="100" y="238" width="400" height="30" rx="4" fill="#f8f9fa" stroke="#e5e7eb"/>
  <text x="300" y="258" text-anchor="middle" font-size="11" fill="#888">EEST is the "standard answer". Both pass = behavior identical. No diff tool needed.</text>
</svg>
