<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="800" height="360" fill="#fafafa" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Test Layers 测试层级</text>

  <!-- Layer 1 -->
  <rect x="30" y="50" width="740" height="60" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="60" y="72" font-weight="700" fill="#1e40af" font-size="14">Layer 1: EVM Conformance (EEST)</text>
  <text x="60" y="92" fill="#666" font-size="12">opcode gas · precompile I/O · transaction execution · state transition · 5000+ fixtures</text>
  <rect x="620" y="60" width="130" height="28" rx="4" fill="#dcfce7"/>
  <text x="685" y="79" text-anchor="middle" font-size="11" fill="#166534">mantle-execution-specs</text>

  <!-- Layer 2 -->
  <rect x="30" y="120" width="740" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="142" font-weight="700" fill="#92400e" font-size="14">Layer 2: RPC Conformance (execution-apis)</text>
  <text x="60" y="162" fill="#666" font-size="12">JSON-RPC method params · return values · error codes · 221 semantic tests</text>
  <rect x="620" y="130" width="130" height="28" rx="4" fill="#fef9c3"/>
  <text x="685" y="149" text-anchor="middle" font-size="11" fill="#854d0e">mantle-execution-apis</text>

  <!-- Layer 3 -->
  <rect x="30" y="190" width="740" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="60" y="212" font-weight="700" fill="#166534" font-size="14">Layer 3: OP Stack E2E + Acceptance</text>
  <text x="60" y="232" fill="#666" font-size="12">op-e2e: deposit · withdraw · sequencer · batcher · fault proof · 173 test files</text>
  <text x="60" y="252" fill="#666" font-size="12">op-acceptance: operator fee · gas oracle · DA footprint · min base fee · chain upgrades</text>
  <rect x="620" y="206" width="130" height="28" rx="4" fill="#dcfce7"/>
  <text x="685" y="225" text-anchor="middle" font-size="11" fill="#166534">mantle-v2 (已适配)</text>

  <!-- Layer 4 -->
  <rect x="30" y="280" width="740" height="60" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-dasharray="6,3"/>
  <text x="60" y="302" font-weight="700" fill="#999" font-size="14">Layer 4: Multi-client (Hive) — Future</text>
  <text x="60" y="322" fill="#bbb" font-size="12">P2P · sync · Engine API · consensus across op-geth vs reth</text>
  <rect x="620" y="290" width="130" height="28" rx="4" fill="#f0f0f0"/>
  <text x="685" y="309" text-anchor="middle" font-size="11" fill="#999">ethereum/hive</text>

  <!-- Not in scope -->
  <text x="400" y="355" text-anchor="middle" font-size="11" fill="#bbb">Not in scope: unit tests (各模块 CI) · L1 contract tests (forge) · benchmark (独立项目)</text>
</svg>
