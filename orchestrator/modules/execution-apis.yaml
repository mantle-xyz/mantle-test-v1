name: execution-apis
description: RPC conformance tests via execution-apis (rpctestgen + speccheck)

source:
  local:
    repo: https://github.com/mantle-xyz/mantle-execution-apis.git
    branch: mantle/main
    path: mantle-execution-apis

  ci:
    repo: mantle-xyz/mantle-execution-apis
    workflow: mantle-test.yaml
    event: mantle-test

suites:
  - name: rpc-conformance
    phase: e2e
    environments: [localchain, qa, mainnet]
    command: |
      cd ${APIS_DIR:-../mantle-execution-apis} &&
      make tools &&
      ./tools/speccheck -v
    env_vars: [APIS_DIR]
    result_format: gotest-json
    timeout: 10m
